<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      min-height: 100vh;
      background: #F88379;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 28px;
      width: 100%;
      max-width: 1000px;
    }

    .tile {
      background: white;
      color: #333;
      text-decoration: none;
      height: 170px;
      border-radius: 22px;

      display: flex;
      justify-content: center;
      align-items: center;

      font-size: 1.3rem;
      font-weight: bold;
      letter-spacing: 1px;

      /* Extruded / recessed effect */
      box-shadow:
        0 14px 0 rgba(0, 0, 0, 0.12),
        0 22px 30px rgba(0, 0, 0, 0.18);

      transform: translateY(0);
      transition:
        transform 0.18s ease,
        box-shadow 0.18s ease,
        background 0.18s ease;
    }

    .tile:hover {
      transform: translateY(6px);

      box-shadow:
        0 8px 0 rgba(0, 0, 0, 0.12),
        0 14px 18px rgba(0, 0, 0, 0.16);

      background: #fafafa;
    }

    .tile:active {
      transform: translateY(12px);

      box-shadow:
        0 2px 0 rgba(0, 0, 0, 0.12),
        0 6px 10px rgba(0, 0, 0, 0.15);
    }

    .container {
      width: 100%;
      max-width: 1000px;
    }

    .title {
      text-align: center;
      color: white;
      font-size: 3rem;
      margin-bottom: 30px;
      text-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    @media (max-width: 600px) {
      .tile {
        height: 140px;
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body>

<body>

  <div class="container">
    <h1 class="title">Ctrl + Alt + Anonymous</h1>

    <div class="dashboard">
      <a class="tile" href="../Waifu-TOOB">Waifu Toob</a>
      <a class="tile" href="../images.html">Images</a>
      <a class="tile" href="../videos.html">Videos</a>
      <a class="tile" href="../articles.html">Articles</a>
      <a class="tile" href="../support.html">Support</a>
    </div>
  </div>

</body>

</body>
</html>
